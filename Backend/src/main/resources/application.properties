spring.application.name=lost-found-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lost_found_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rahul123}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 disabled - using MySQL directly

# Database initialization is handled by DatabaseInitializer.java
spring.sql.init.mode=never

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JPA Configuration
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# JWT Configuration
app.jwtSecret=55878d9e4175052f4e356dc06c68d78aeaed98c193a7b285d1e7278c04bc135f
app.jwtExpirationMs=86400000

# Logging
logging.level.root=INFO
logging.level.com.lostfound=DEBUG

# CORS
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://lost-track.vercel.app
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Actuator - Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
