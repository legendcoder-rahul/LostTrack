spring.application.name=lost-found-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration - supports environment variables for Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lost_found_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rahul123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database initialization
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# JWT Configuration
app.jwtSecret=${JWT_SECRET:55878d9e4175052f4e356dc06c68d78aeaed98c193a7b285d1e7278c04bc135f}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# Logging
logging.level.root=INFO
logging.level.com.lostfound=DEBUG

# CORS Configuration - supports multiple origins
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Actuator for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
